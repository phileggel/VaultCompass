<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Manager</title>
    <!-- Apply theme before first paint to prevent flash of unstyled content -->
    <script>
      (() => {
        const stored = localStorage.getItem("theme-mode");
        const mode = stored === "day" || stored === "night" || stored === "auto" ? stored : "auto";
        if (mode === "night" || (mode === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
