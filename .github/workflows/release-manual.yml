name: Release Manual

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.9.0)"
        required: true
      platform:
        description: "Platform to build"
        required: true
        type: choice
        default: windows
        options:
          - windows
          - macos-x86
          - macos-arm
          - linux

concurrency:
  group: release-manual-${{ inputs.tag }}-${{ inputs.platform }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ inputs.platform == 'windows' && 'windows-latest' || inputs.platform == 'linux' && 'ubuntu-22.04' || inputs.platform == 'macos-x86' && 'macos-13' || 'macos-latest' }}
    timeout-minutes: 60
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.platform == 'windows' && 'x86_64-pc-windows-msvc' || inputs.platform == 'macos-x86' && 'x86_64-apple-darwin' || inputs.platform == 'macos-arm' && 'aarch64-apple-darwin' || 'x86_64-unknown-linux-gnu' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: ${{ inputs.platform }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Linux dependencies
        if: inputs.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        shell: bash
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SQLX_OFFLINE: true
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: "-C debuginfo=0"
        with:
          tauriScript: npm run tauri
          args: --target ${{ inputs.platform == 'windows' && 'x86_64-pc-windows-msvc' || inputs.platform == 'macos-x86' && 'x86_64-apple-darwin' || inputs.platform == 'macos-arm' && 'aarch64-apple-darwin' || 'x86_64-unknown-linux-gnu' }}
          tagName: ${{ inputs.tag }}
          releaseName: "VaultCompass ${{ inputs.tag }}"
          releaseBody: "See the release assets to download and install this version."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true

      - name: Verify updater manifest published
        if: success() && inputs.platform == 'windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for release assets to be available..."
          sleep 10
          STATUS=$(gh release view "${{ inputs.tag }}" --repo "${{ github.repository }}" --json assets --jq '[.assets[].name] | map(select(test("latest\\.json"))) | length')
          if [ "$STATUS" -eq 0 ]; then
            echo "::warning::latest.json was not found in release assets — updater endpoint may be broken"
          else
            echo "✓ latest.json found in release assets"
          fi

      - name: Clear Rust cache on failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh cache delete --all --repo ${{ github.repository }} || true
