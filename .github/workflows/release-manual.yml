name: Release Manual

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.9.0)"
        required: true
      platform:
        description: "Platform to build"
        required: true
        type: choice
        default: windows
        options:
          - windows
          - macos-x86
          - macos-arm
          - linux

concurrency:
  group: release-manual-${{ inputs.tag }}-${{ inputs.platform }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ inputs.platform == 'windows' && 'windows-latest' || inputs.platform == 'linux' && 'ubuntu-22.04' || inputs.platform == 'macos-x86' && 'macos-13' || 'macos-latest' }}
    timeout-minutes: 60
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Verify tag is on main
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git fetch origin main
          COMMIT=$(git rev-list -n 1 "$TAG")
          git merge-base --is-ancestor "$COMMIT" origin/main \
            || { echo "Tag $TAG is not on main branch — aborting release"; exit 1; }

      - name: Resolve platform target
        id: target
        shell: bash
        env:
          PLATFORM: ${{ inputs.platform }}
        run: |
          case "$PLATFORM" in
            windows)   echo "triple=x86_64-pc-windows-msvc" >> "$GITHUB_OUTPUT" ;;
            macos-x86) echo "triple=x86_64-apple-darwin" >> "$GITHUB_OUTPUT" ;;
            macos-arm) echo "triple=aarch64-apple-darwin" >> "$GITHUB_OUTPUT" ;;
            linux)     echo "triple=x86_64-unknown-linux-gnu" >> "$GITHUB_OUTPUT" ;;
            *)         echo "::error::Unknown platform '$PLATFORM'"; exit 1 ;;
          esac

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ steps.target.outputs.triple }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: ${{ inputs.platform }}-release-rust-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Linux dependencies
        if: inputs.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        shell: bash
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SQLX_OFFLINE: true
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: "-C debuginfo=0"
        with:
          tauriScript: npm run tauri
          args: --target ${{ steps.target.outputs.triple }}
          tagName: ${{ inputs.tag }}
          releaseName: "VaultCompass ${{ inputs.tag }}"
          releaseBody: "See the release assets to download and install this version."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Verify updater manifest published
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for release assets to be available..."
          for i in 1 2 3; do
            sleep 10
            STATUS=$(gh release view "${{ inputs.tag }}" --repo "${{ github.repository }}" --json assets --jq '[.assets[].name] | map(select(test("latest\\.json"))) | length')
            if [ "$STATUS" -gt 0 ]; then
              echo "✓ latest.json found in release assets"
              exit 0
            fi
            echo "Attempt $i: latest.json not yet available, retrying..."
          done
          echo "::error::latest.json was not found in release assets after 3 attempts — updater endpoint is broken"
          exit 1

      - name: Clear Rust cache on failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh cache delete --pattern "${{ inputs.platform }}-release-rust-" --repo ${{ github.repository }} || true
