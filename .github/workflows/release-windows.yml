name: Release Windows

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-windows-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: windows-rust-

      - name: Clear stale WiX artifacts
        shell: powershell
        run: Remove-Item -Recurse -Force "src-tauri\target\x86_64-pc-windows-msvc\release\wix" -ErrorAction SilentlyContinue

      - name: Verify tag is on main
        shell: bash
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$COMMIT_SHA" origin/main \
            || { echo "Tag is not on main branch — aborting release"; exit 1; }

      - name: Install frontend dependencies
        shell: bash
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SQLX_OFFLINE: true
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: "-C debuginfo=0"
        with:
          tauriScript: npm run tauri
          args: --target x86_64-pc-windows-msvc
          tagName: ${{ github.ref_name }}
          releaseName: "VaultCompass ${{ github.ref_name }}"
          releaseBody: "See the release assets to download and install this version."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Verify updater manifest published
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for release assets to be available..."
          for i in 1 2 3; do
            sleep 10
            STATUS=$(gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json assets --jq '[.assets[].name] | map(select(test("latest\\.json"))) | length')
            if [ "$STATUS" -gt 0 ]; then
              echo "✓ latest.json found in release assets"
              exit 0
            fi
            echo "Attempt $i: latest.json not yet available, retrying..."
          done
          echo "::error::latest.json was not found in release assets after 3 attempts — updater endpoint may be broken"
          exit 1

      - name: Clear Rust cache on failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh cache delete --pattern "windows-rust-" --repo ${{ github.repository }} || true
