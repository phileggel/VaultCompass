name: Security Audit

on:
  schedule:
    - cron: "0 8 * * 1" # every Monday at 08:00 UTC
  workflow_dispatch: # allow manual trigger

concurrency:
  group: security-audit
  cancel-in-progress: false

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Run npm audit
        shell: bash
        # --audit-level=moderate: fail on moderate, high, and critical CVEs.
        # Low-severity issues are informational only and do not block.
        run: npm audit --audit-level=moderate

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        # Pinned to full SHA of taiki-e/install-action (installs cargo-audit)
        uses: taiki-e/install-action@db5fb34fa772531a3ece57ca434f579eb334e0fb
        with:
          tool: cargo-audit

      - name: Run cargo audit
        shell: bash
        working-directory: src-tauri
        # --ignore RUSTSEC-2023-0071: rsa Marvin Attack — accepted risk (sqlx-mysql transitive,
        # sqlite-only project, no fix available). Re-evaluate when sqlx fixes or we change DB.
        run: cargo audit --ignore RUSTSEC-2023-0071
