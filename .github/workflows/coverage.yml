name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — test & coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        shell: bash
        run: npm ci

      - name: Run tests with coverage
        shell: bash
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        # Pinned to full SHA for v5.5.4 — mutable tags are a supply-chain risk
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/frontend/lcov.info
          flags: frontend
          fail_ci_if_error: false # non-blocking: Codecov outages should not fail CI

  backend:
    name: Backend — test & clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      SQLX_OFFLINE: true
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: "-C debuginfo=0"

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: linux-coverage-rust-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Check formatting
        working-directory: src-tauri
        shell: bash
        run: cargo fmt --check

      - name: Run Clippy
        working-directory: src-tauri
        shell: bash
        run: cargo clippy --all-targets -- -D warnings

      - name: Install cargo-tarpaulin
        # Pinned to full SHA of taiki-e/install-action (installs cargo-tarpaulin v2.75.30)
        uses: taiki-e/install-action@db5fb34fa772531a3ece57ca434f579eb334e0fb
        with:
          tool: cargo-tarpaulin

      - name: Run tests with coverage
        working-directory: src-tauri
        shell: bash
        run: cargo tarpaulin --out Lcov --output-dir ../coverage/backend --lib --exclude-files "build.rs" --exclude-files "src/bin/generate_bindings.rs"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/backend/lcov.info
          flags: backend
          fail_ci_if_error: false
